services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    env_file:
      - ./apps/backend/.env
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    env_file:
      - ./apps/frontend/.env
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  db:
    image: mongodb/mongodb-atlas-local:latest
    ports:
      - 27017:27017
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=user
      - MONGODB_INITDB_ROOT_PASSWORD=pass
    volumes:
      - mongo_atlas_data:/data/db
      - mongo_atlas_config_data:/data/configdb
      - mongo_atlas_search_data:/data/mongot
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try {
            if (rs.status().ok) {
              quit(0);
            }
          } catch (e) {
            rs.initiate({
              _id: 'rs0',
              members: [{ _id: 0, host: 'localhost:27017' }]
            });
            quit(0);
          }
        "
      interval: 10s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: elasticsearch:9.3.1
    ports:
      - 9200:9200
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_atlas_data:
  mongo_atlas_config_data:
  mongo_atlas_search_data:
  esdata:
